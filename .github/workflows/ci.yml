name: CI/CD Pipeline

# Déclenchement sur push et pull_request sur la branche main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Build & Tests
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build et Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm install

      - name: Lancement des tests unitaires
        run: npm test
        # Le pipeline s'arrête ici si les tests échouent
        # Les jobs suivants dépendent du succès de ce job

      - name: Build de l'application
        run: npm run build --if-present

  # ─────────────────────────────────────────────
  # JOB 2 : Docker Build & Push (Bonus)
  # Ne s'exécute que si les tests passent ET on est sur main
  # ─────────────────────────────────────────────
  docker-push:
    name: Docker Build et Push
    runs-on: ubuntu-latest
    needs: build-and-test          # Dépend du succès des tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mon-app:latest

  # ─────────────────────────────────────────────
  # JOB 3 : Déploiement via SSH (Avancé)
  # Ne s'exécute que si Docker push a réussi
  # ─────────────────────────────────────────────
  deploy-ssh:
    name: Déploiement sur serveur SSH
    runs-on: ubuntu-latest
    needs: docker-push             # Dépend du push Docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Déploiement sur le serveur distant
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Télécharger la nouvelle image
            docker pull ${{ secrets.DOCKER_USERNAME }}/mon-app:latest
            # Arrêter le conteneur existant s'il tourne
            docker stop mon-app-container || true
            docker rm mon-app-container || true
            # Redémarrer avec la nouvelle image
            docker run -d --name mon-app-container \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/mon-app:latest
            echo "Déploiement réussi !"
